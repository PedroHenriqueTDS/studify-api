services:
  # ── API Spring Boot ──────────────────────────────────────────────────────
  - type: web
    name: studify-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    envVars:
      - key: DB_URL
        fromDatabase:
          name: studify-mysql
          property: connectionString
      - key: DB_USERNAME
        fromDatabase:
          name: studify-mysql
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: studify-mysql
          property: password
      - key: JWT_SECRET
        generateValue: true
      - key: DDL_AUTO
        value: update
      - key: SHOW_SQL
        value: "false"
    healthCheckPath: /actuator/health

databases:
  - name: studify-mysql
    plan: free
    databaseName: studify_db
